<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Galaxy + Photo Noir Editor</title>
<style>
  :root{--accent:#ff66c4}
  html,body{height:100%;margin:0;background:#05040a;color:#fff;font-family:Inter,Arial,Helvetica,sans-serif}
  .stage{position:fixed;inset:0;overflow:hidden}
  canvas#stars{position:absolute;inset:0;z-index:0}
  .ui{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;height:100%;padding:24px}
  .card{background:linear-gradient(180deg,rgba(0,0,0,0.35),rgba(0,0,0,0.55));backdrop-filter:blur(6px);border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,0.6);max-width:920px;width:100%;display:flex;gap:18px;align-items:center}
  .preview{flex:1;display:flex;align-items:center;justify-content:center;min-height:320px;position:relative}
  .preview canvas{max-width:100%;max-height:70vh;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,0.6);}
  .controls{width:360px;min-width:260px}
  .controls label{display:block;font-size:0.9rem;margin-bottom:6px;color:#ddd}
  .row{display:flex;gap:8px;align-items:center}
  .btn{background:var(--accent);border:none;padding:10px 14px;border-radius:10px;color:white;cursor:pointer;font-weight:600}
  .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.12)}
  input[type=range]{width:100%}
  .small{font-size:0.9rem;color:#ddd}
  .note{font-size:0.85rem;color:#ccc;margin-top:8px}
  .file-input{display:flex;gap:8px}
  .center{display:flex;align-items:center;justify-content:center}
  footer{position:fixed;left:12px;bottom:12px;color:#999;font-size:13px}
  @media (max-width:900px){.card{flex-direction:column}.controls{width:100%}}
</style>
</head>
<body>
<div class="stage">
  <canvas id="stars"></canvas>
</div>
<div class="ui">
  <div class="card">
    <div class="preview">
      <canvas id="photoCanvas" width="800" height="600"></canvas>
    </div>
    <div class="controls">
      <div class="file-input">
        <label class="btn" for="file">Pilih Foto</label>
        <input id="file" type="file" accept="image/*" style="display:none">
        <button class="btn secondary" id="useSample">Gunakan Contoh</button>
      </div>

      <div style="margin-top:10px">
        <label class="small">Filter Noir</label>
        <div class="row">
          <label class="small">Kontras</label>
          <input id="contrast" type="range" min="0.5" max="2.5" step="0.05" value="1.5">
        </div>
        <div class="row">
          <label class="small">Kecerahan</label>
          <input id="brightness" type="range" min="0.5" max="1.2" step="0.01" value="0.95">
        </div>
        <div class="row">
          <label class="small">Grain</label>
          <input id="grain" type="range" min="0" max="30" step="1" value="12">
        </div>
        <div class="row">
          <label class="small">Vignette</label>
          <input id="vignette" type="range" min="0.6" max="3.0" step="0.05" value="1.6">
        </div>
      </div>

      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" id="apply">Terapkan</button>
        <button class="btn secondary" id="toggle">Toggle Original</button>
        <button class="btn" id="download">Download Hasil</button>
        <button class="btn secondary" id="reset">Reset</button>
      </div>

      <div class="note">Semua pemrosesan terjadi di browser (tidak diunggah). Gunakan tombol "Pilih Foto" untuk memuat foto Anda, lalu tekan "Terapkan" untuk efek noir.</div>
    </div>
  </div>
</div>
<footer>Galaxy animation • Noir editor — file lokal saja</footer>

<script>
// Starfield animation
const starCanvas = document.getElementById('stars');
const sctx = starCanvas.getContext('2d');
let stars = [];
function resizeStars(){
  starCanvas.width = innerWidth;
  starCanvas.height = innerHeight;
  initStars();
}
function initStars(){
  stars = [];
  const count = Math.floor((innerWidth*innerHeight)/9000);
  for(let i=0;i<count;i++){
    stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,z:Math.random()*1.2+0.2,r:Math.random()*1.3+0.3,blink:Math.random()*1.5})
  }
}
function drawStars(t){
  sctx.clearRect(0,0,starCanvas.width,starCanvas.height);
  for(let i=0;i<stars.length;i++){
    const st = stars[i];
    const alpha = 0.5 + 0.5*Math.sin((t/600)+st.blink);
    sctx.fillStyle = `rgba(255,255,255,${alpha})`;
    sctx.beginPath();
    sctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
    sctx.fill();
  }
}
window.addEventListener('resize',resizeStars);
resizeStars();
let last = performance.now();
(function anim(t){
  drawStars(t);
  requestAnimationFrame(anim);
})();

// Photo noir processing
const fileInput = document.getElementById('file');
const canvas = document.getElementById('photoCanvas');
const ctx = canvas.getContext('2d');
let originalImage = null;
let showingOriginal = false;

const contrastEl = document.getElementById('contrast');
const brightnessEl = document.getElementById('brightness');
const grainEl = document.getElementById('grain');
const vignetteEl = document.getElementById('vignette');

const applyBtn = document.getElementById('apply');
const downloadBtn = document.getElementById('download');
const toggleBtn = document.getElementById('toggle');
const resetBtn = document.getElementById('reset');
const useSample = document.getElementById('useSample');

function fitCanvasToImage(img){
  const maxW = 900; const maxH = 700;
  let w = img.naturalWidth; let h = img.naturalHeight;
  const ratio = Math.min(maxW/w, maxH/h, 1);
  canvas.width = Math.round(w*ratio); canvas.height = Math.round(h*ratio);
}

function drawOriginal(){
  if(!originalImage) return;
  fitCanvasToImage(originalImage);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(originalImage, 0,0, canvas.width, canvas.height);
}

function applyNoir(){
  if(!originalImage) return;
  fitCanvasToImage(originalImage);
  ctx.drawImage(originalImage,0,0,canvas.width,canvas.height);
  let imageData = ctx.getImageData(0,0,canvas.width, canvas.height);
  let d = imageData.data;
  const c = parseFloat(contrastEl.value);
  const b = parseFloat(brightnessEl.value);
  const grain = parseFloat(grainEl.value);
  const vign = parseFloat(vignetteEl.value);
  // desaturate & contrast & brightness
  for(let i=0;i<d.length;i+=4){
    const r=d[i], g=d[i+1], bb=d[i+2];
    const gray = 0.299*r + 0.587*g + 0.114*bb;
    // apply contrast centered at 128
    let val = (gray - 128) * c + 128;
    val = val * b;
    d[i]=d[i+1]=d[i+2]=Math.max(0,Math.min(255,val));
  }
  ctx.putImageData(imageData,0,0);
  // vignette
  const w = canvas.width, h = canvas.height;
  const vGrad = ctx.createRadialGradient(w/2,h/2, Math.min(w,h)*0.15, w/2,h/2, Math.max(w,h));
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, 'rgba(0,0,0,'+ (0.55 * (vign/1.6)) +')');
  ctx.fillStyle = vGrad;
  ctx.fillRect(0,0,w,h);
  // grain
  const gData = ctx.getImageData(0,0,w,h);
  for(let i=0;i<gData.data.length;i+=4){
    const n = (Math.random()-0.5) * grain;
    for(let c=0;c<3;c++){
      let v = gData.data[i+c] + n;
      gData.data[i+c] = Math.max(0, Math.min(255, v));
    }
  }
  ctx.putImageData(gData,0,0);
}

fileInput.addEventListener('change',(e)=>{
  const f = e.target.files[0];
  if(!f) return;
  const url = URL.createObjectURL(f);
  const img = new Image();
  img.onload = ()=>{
    originalImage = img;
    drawOriginal();
    URL.revokeObjectURL(url);
  };
  img.src = url;
});

useSample.addEventListener('click', ()=>{
  // sample placeholder (transparent person silhouette) - use data URL or external placeholder
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = ()=>{ originalImage = img; drawOriginal(); };
  img.src = 'https://raw.githubusercontent.com/rapyakbar111-blip/Raffy/main/index.html'.replace('index.html','').concat('ghost-sample.jpg');
  // If sample not found, fallback to a simple gradient image
  img.onerror = ()=>{
    const temp = document.createElement('canvas');temp.width=800;temp.height=600;const tctx = temp.getContext('2d');
    const grad = tctx.createLinearGradient(0,0,800,600);grad.addColorStop(0,'#333');grad.addColorStop(1,'#111');tctx.fillStyle=grad;tctx.fillRect(0,0,800,600);
    const data = temp.toDataURL('image/png');const ii = new Image();ii.onload=()=>{originalImage=ii;drawOriginal()};ii.src=data;
  }
});

applyBtn.addEventListener('click',()=>{ applyNoir(); showingOriginal=false; });

toggleBtn.addEventListener('click',()=>{
  if(!originalImage) return;
  showingOriginal = !showingOriginal;
  if(showingOriginal) drawOriginal(); else applyNoir();
});

downloadBtn.addEventListener('click',()=>{
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/jpeg',0.92);
  a.download = 'photo-noir.jpg';
  a.click();
});

resetBtn.addEventListener('click',()=>{ if(originalImage) drawOriginal(); });

// drag & drop support
window.addEventListener('dragover',(e)=>{ e.preventDefault(); });
window.addEventListener('drop',(e)=>{ e.preventDefault(); if(e.dataTransfer.files && e.dataTransfer.files[0]){ fileInput.files = e.dataTransfer.files; const ev = new Event('change'); fileInput.dispatchEvent(ev); } });

// initial blank canvas
(function fillBlank(){ ctx.fillStyle='#0b0b10'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#666'; ctx.font='20px sans-serif'; ctx.textAlign='center'; ctx.fillText('Pilih foto untuk mulai — tarik & lepas juga didukung', canvas.width/2, canvas.height/2); })();
</script>
</body>
</html>
